<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BookZad · بوک‌زاد</title>
<meta name="description" content="BookZad — a smarter bookmark manager. Choose your language.">
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="choose">
    <img class="logo" src="assets/logo.png" alt="BookZad">
    <h1>BookZad<span class="sep">·</span><span dir="rtl">بوک‌زاد</span></h1>
    <p class="tag">
      A smarter way to keep your bookmarks.<br>
      <span dir="rtl">راهی هوشمندتر برای نگه‌داری نشانک‌ها.</span>
    </p>
    <nav class="langs">
      <a class="langbtn" href="en/"><img class="flag" src="assets/flags/gb.svg" alt="" width="44" height="44"><strong>English</strong></a>
      <a class="langbtn" href="de/"><img class="flag" src="assets/flags/de.svg" alt="" width="44" height="44"><strong>Deutsch</strong></a>
      <a class="langbtn" href="fr/"><img class="flag" src="assets/flags/fr.svg" alt="" width="44" height="44"><strong>Français</strong></a>
      <a class="langbtn" href="it/"><img class="flag" src="assets/flags/it.svg" alt="" width="44" height="44"><strong>Italiano</strong></a>
      <a class="langbtn" href="nl/"><img class="flag" src="assets/flags/nl.svg" alt="" width="44" height="44"><strong>Nederlands</strong></a>
      <a class="langbtn" href="tr/"><img class="flag" src="assets/flags/tr.svg" alt="" width="44" height="44"><strong>Türkçe</strong></a>
      <a class="langbtn fa" href="fa/" dir=rtl><img class="flag" src="assets/flags/lion-sun.svg" alt="" width="44" height="44"><strong>فارسی</strong></a>
    </nav>
    <p class="foot">
      <a href="https://github.com/amirzenoozi/book-zad" target="_blank" rel="noopener">GitHub</a>
      <span class="dotsep">·</span>
      <span class="credit">Flags by <a href="https://github.com/twitter/twemoji" target="_blank" rel="noopener">Twemoji</a> (CC-BY 4.0); Lion and Sun flag from <a href="https://commons.wikimedia.org/wiki/File:Lion_and_Sun_flag_(emoji).svg" target="_blank" rel="noopener">Wikimedia Commons</a> (CC0)</span>
    </p>
  </main>
</body>
</html>
