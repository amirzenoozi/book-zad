<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="mock.css"></head>
<body>
<div style="width:600px; height:1031px; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(560px 380px at 20% -8%, #d9f6ec 0, rgba(217,246,236,0) 60%),
    radial-gradient(520px 420px at 108% 8%, #d7f3ff 0, rgba(215,243,255,0) 55%),
    linear-gradient(160deg, #ffffff, #eef4f2);">
  <div class="popup light" style="width:440px; transform:scale(1.18); box-shadow:0 40px 90px rgba(20,60,52,0.18);">
    <div class="head"><span class="mark"></span><b>BookZad</b></div>
    <div class="cta">Open manager</div>
    <div class="sec">
      <h4>Suggestions</h4>
      <div class="row"><span class="lab">Similarity nudge</span><span class="sw"></span></div>
      <div class="hint">Badge the toolbar icon when a page resembles a folder you keep.</div>
      <div class="row"><span class="lab">In-page toast</span><span class="sw off"></span></div>
      <div class="hint">Also show an actionable in-page card (add / open).</div>
      <div style="margin-top:14px;">
        <div class="row" style="margin-top:0;"><span class="lab">Suggestion threshold</span><span class="stag">18%</span></div>
        <div class="rangebar"><i></i><b></b></div>
      </div>
    </div>
    <div class="sec">
      <h4>Appearance</h4>
      <div class="row"><span class="lab">Theme</span><span class="selrow">Light</span></div>
    </div>
  </div>
</div>
</body></html>
